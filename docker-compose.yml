# ============================================
# WasaiTalent 人才管理系统 - Docker Compose 配置
# ============================================
# 使用方式:
#   启动: docker compose up -d --build
#   停止: docker compose down
#   日志: docker compose logs -f
# ============================================

services:
  # ---------- 应用服务 ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wasaitalent-app
    restart: unless-stopped
    ports:
      - "3333:3333"
    volumes:
      # SQLite 数据库持久化
      - app-data:/app/server/data
    environment:
      - NODE_ENV=production
      - PORT=3333
      - JWT_SECRET=Wasa1Ta1ent_S3cur3_JWT_2024!@#$%^&*()_Pr0duct10n
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    networks:
      - wasaitalent-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ---------- 数据卷 ----------
volumes:
  app-data:
    driver: local
    name: wasaitalent-data

# ---------- 网络 ----------
networks:
  wasaitalent-network:
    driver: bridge
    name: wasaitalent-network
